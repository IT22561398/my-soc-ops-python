<div id="game-container">
    <div class="flex flex-col items-center justify-center min-h-full p-6">
        <div class="text-center max-w-sm">
            <h1 class="corp-heading mb-2">Soc Ops</h1>
            <p class="corp-subheading mb-8">Social Bingo</p>

            <div class="corp-card mb-8">
                <h2 class="font-semibold corp-subheading mb-3">How to play</h2>
                <ul class="text-left corp-muted text-sm space-y-2">
                    <li>• Find people who match the questions</li>
                    <li>• Tap a square when you find a match</li>
                    <li>• Get 5 in a row to win!</li>
                </ul>
            </div>

            <button
                hx-post="/start"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full corp-btn text-lg">
                Start Game
            </button>
        </div>
    </div>
</div>
